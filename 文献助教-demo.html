<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>文献助教 · 选题导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --ink-light: #4a3f35;
    --ink-faint: #8a7a6e;
    --paper: #faf7f2;
    --paper-warm: #f2ece2;
    --paper-deep: #e8dece;
    --accent: #c0392b;
    --accent-warm: #e8734a;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --seal: #c0392b;
    --border: #d4c4a8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ─── SCREENS ─── */
  .screen {
    display: none;
    flex-direction: column;
    min-height: 100dvh;
    position: relative;
    z-index: 1;
    animation: fadeIn 0.5s ease;
  }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── HEADER ─── */
  .header {
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
  }
  .header-badge {
    display: inline-block;
    font-family: 'Noto Serif SC', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .header-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .header-title span {
    color: var(--accent);
  }
  .header-sub {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* Decorative line */
  .deco-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 24px 0;
    opacity: 0.4;
  }
  .deco-line::before, .deco-line::after {
    content: ''; flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
  .deco-diamond {
    width: 5px; height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ─── SCREEN 1: HOME ─── */
  #screen-home {
    background: var(--paper);
  }

  .home-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px 24px 40px;
    gap: 20px;
  }

  .prompt-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-faint);
    font-weight: 500;
    text-transform: uppercase;
  }

  .input-wrapper {
    position: relative;
  }
  textarea {
    width: 100%;
    min-height: 130px;
    padding: 16px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  textarea::placeholder { color: var(--ink-faint); font-size: 14px; }
  textarea:focus { border-color: var(--gold); }

  .char-count {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 10px;
    color: var(--ink-faint);
  }

  .examples-label {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .examples {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .example-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--paper-warm);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 13px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
  }
  .example-chip:active { background: var(--paper-deep); transform: scale(0.98); }
  .example-chip::before { content: '→'; color: var(--gold); flex-shrink: 0; }

  .btn-primary {
    width: 100%;
    padding: 18px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 3px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s;
    -webkit-appearance: none;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.06));
  }

  .home-footer {
    text-align: center;
    padding-bottom: 28px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.5px;
  }

  /* ─── SCREEN 2: LOADING ─── */
  #screen-loading {
    align-items: center;
    justify-content: center;
    background: var(--paper);
    gap: 32px;
  }

  .loading-icon {
    width: 64px; height: 64px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-steps {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 280px;
  }
  .loading-step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 3px;
    font-size: 13px;
    color: var(--ink-faint);
    transition: all 0.4s;
  }
  .loading-step.active {
    background: var(--paper-warm);
    color: var(--ink-light);
  }
  .loading-step.done {
    color: var(--gold);
  }
  .step-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.4s;
  }
  .loading-step.active .step-dot { background: var(--accent); }
  .loading-step.done .step-dot { background: var(--gold); }

  .loading-topic {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    color: var(--ink-faint);
    text-align: center;
    max-width: 260px;
    line-height: 1.6;
  }
  .loading-topic strong {
    color: var(--ink-light);
    font-weight: 600;
  }

  /* ─── SCREEN 3: RESULTS ─── */
  #screen-results {
    background: var(--paper);
  }

  .results-body {
    flex: 1;
    padding: 20px 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .result-meta {
    padding: 14px 16px;
    background: var(--paper-warm);
    border: 1px solid var(--border);
    border-radius: 3px;
  }
  .result-meta-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .result-topic {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.5;
  }
  .result-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .keyword-tag {
    padding: 3px 9px;
    background: var(--paper-deep);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--ink-light);
  }

  /* Perspective cards */
  .perspective-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
    position: relative;
  }
  .card.selected {
    border-color: var(--accent);
  }
  .card-label-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 0;
  }
  .card-letter {
    width: 28px; height: 28px;
    background: var(--ink);
    color: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    font-weight: 700;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .card.selected .card-letter { background: var(--accent); }
  .card-domain {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }

  .card-body {
    padding: 10px 16px 14px;
  }
  .card-entry {
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.65;
    margin-bottom: 10px;
    border-left: 2px solid var(--paper-deep);
    padding-left: 10px;
  }

  .papers-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-top: 1px solid var(--paper-warm);
    cursor: pointer;
    user-select: none;
  }
  .papers-toggle-label {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .papers-toggle-icon {
    font-size: 11px;
    color: var(--ink-faint);
    transition: transform 0.2s;
  }
  .papers-toggle.open .papers-toggle-icon { transform: rotate(180deg); }

  .papers-list {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding-top: 8px;
  }
  .papers-list.open { display: flex; }

  .paper-item {
    padding: 10px 12px;
    background: var(--paper-warm);
    border-radius: 3px;
    border-left: 3px solid var(--border);
  }
  .paper-item.cross { border-left-color: var(--gold); }
  .paper-title {
    font-size: 12px;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 4px;
  }
  .paper-meta {
    font-size: 10px;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .paper-tag {
    padding: 1px 6px;
    background: var(--paper-deep);
    border-radius: 10px;
  }

  /* Select section */
  .select-section {
    margin-top: 4px;
    padding: 16px;
    background: var(--paper-warm);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .select-label {
    font-size: 12px;
    color: var(--ink-faint);
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .select-btns {
    display: flex;
    gap: 10px;
  }
  .select-btn {
    flex: 1;
    padding: 14px 0;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--ink-light);
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 600;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.18s;
    -webkit-appearance: none;
  }
  .select-btn:active { transform: scale(0.96); }
  .select-btn.chosen {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .select-btn-confirm {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: var(--accent);
    color: #fff;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s;
    -webkit-appearance: none;
  }
  .select-btn-confirm.visible { display: block; }
  .select-btn-confirm:active { opacity: 0.85; }

  /* ─── SCREEN 4: CONFIRM ─── */
  #screen-confirm {
    background: var(--paper);
    align-items: center;
    justify-content: center;
  }

  .confirm-body {
    width: 100%;
    max-width: 380px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .seal {
    width: 72px; height: 72px;
    background: var(--seal);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    color: #fff;
    font-weight: 700;
    transform: rotate(-8deg);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    animation: sealStamp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes sealStamp {
    0% { transform: rotate(-8deg) scale(2); opacity: 0; }
    100% { transform: rotate(-8deg) scale(1); opacity: 1; }
  }

  .confirm-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    letter-spacing: 1px;
  }

  .confirm-card {
    width: 100%;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .confirm-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .confirm-row-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .confirm-row-value {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.5;
  }

  .confirm-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .btn-secondary {
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--ink-light);
    font-size: 14px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.18s;
    -webkit-appearance: none;
  }
  .btn-secondary:active { background: var(--paper-warm); }

  /* ─── SCREEN 5: ERROR ─── */
  #screen-error {
    align-items: center;
    justify-content: center;
    background: var(--paper);
  }
  .error-body {
    padding: 40px 24px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .error-icon { font-size: 40px; }
  .error-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--ink);
  }
  .error-msg {
    font-size: 13px;
    color: var(--ink-faint);
    line-height: 1.65;
    max-width: 280px;
  }
  .btn-retry {
    padding: 14px 32px;
    background: var(--ink);
    color: var(--paper);
    font-size: 14px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    margin-top: 8px;
    -webkit-appearance: none;
  }

  /* ─── BACK BUTTON ─── */
  .back-btn {
    position: absolute;
    top: 16px;
    left: 16px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--ink-faint);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    z-index: 10;
  }
  .back-btn::before { content: '←'; }

  /* Skeleton / loading placeholder */
  .skel {
    background: linear-gradient(90deg, var(--paper-warm) 25%, var(--paper-deep) 50%, var(--paper-warm) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 3px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ─── MOBILE MAX-WIDTH ─── */
  @media (min-width: 500px) {
    .screen {
      max-width: 430px;
      margin: 0 auto;
      box-shadow: 0 0 60px rgba(0,0,0,0.12);
      min-height: 100dvh;
    }
  }
</style>
</head>
<body>

<!-- ═══ SCREEN 1: HOME ═══ -->
<div class="screen active" id="screen-home">
  <div class="header">
    <div class="header-badge">Academic Research Assistant</div>
    <div class="header-title">文 献 <span>助 教</span></div>
    <div class="header-sub">高校老师 · 选题好帮手</div>
  </div>
  <div class="deco-line"><div class="deco-diamond"></div></div>

  <div class="home-body">
    <div>
      <div class="prompt-label" style="margin-bottom:10px;">输入你的研究想法</div>
      <div class="input-wrapper">
        <textarea id="research-input" placeholder="例如：我想研究数字教材对大学生学习效果的影响……" maxlength="300"></textarea>
        <span class="char-count" id="char-count">0 / 300</span>
      </div>
    </div>

    <div>
      <div class="examples-label">或者从这里开始 ↓</div>
      <div class="examples">
        <div class="example-chip" onclick="fillExample(this)">数字教材对大学生学习效果的长期影响</div>
        <div class="example-chip" onclick="fillExample(this)">AI辅助教学在特殊教育中的应用</div>
        <div class="example-chip" onclick="fillExample(this)">高校教师职业倦怠与数字化转型压力</div>
      </div>
    </div>

    <button class="btn-primary" onclick="startAnalyze()">开 始 选 题</button>
  </div>

  <div class="home-footer">由 Claude AI 提供支持 · 仅供演示</div>
</div>

<!-- ═══ SCREEN 2: LOADING ═══ -->
<div class="screen" id="screen-loading">
  <div class="loading-icon"></div>
  <div class="loading-topic">正在分析：<br><strong id="loading-topic-text"></strong></div>
  <div class="loading-steps">
    <div class="loading-step" id="step1"><div class="step-dot"></div>解析研究需求与关键词</div>
    <div class="loading-step" id="step2"><div class="step-dot"></div>跨领域创新视角迁移</div>
    <div class="loading-step" id="step3"><div class="step-dot"></div>匹配参考文献</div>
    <div class="loading-step" id="step4"><div class="step-dot"></div>生成研究导航卡片</div>
  </div>
</div>

<!-- ═══ SCREEN 3: RESULTS ═══ -->
<div class="screen" id="screen-results">
  <span class="back-btn" onclick="goHome()">重新输入</span>
  <div class="header" style="padding-top: 48px;">
    <div class="header-badge">Research Navigation</div>
    <div class="header-title">研究 <span>导航</span></div>
  </div>
  <div class="deco-line"><div class="deco-diamond"></div></div>

  <div class="results-body" id="results-body">
    <!-- Filled by JS -->
  </div>
</div>

<!-- ═══ SCREEN 4: CONFIRM ═══ -->
<div class="screen" id="screen-confirm">
  <div class="confirm-body">
    <div class="seal" id="confirm-letter">A</div>
    <div class="confirm-title">选题已确定</div>

    <div class="confirm-card">
      <div class="confirm-row">
        <div class="confirm-row-label">研究方向</div>
        <div class="confirm-row-value" id="confirm-domain">—</div>
      </div>
      <div class="deco-line" style="margin: 4px 0;"><div class="deco-diamond"></div></div>
      <div class="confirm-row">
        <div class="confirm-row-label">研究切入点</div>
        <div class="confirm-row-value" id="confirm-entry">—</div>
      </div>
      <div class="confirm-row">
        <div class="confirm-row-label">原始研究主题</div>
        <div class="confirm-row-value" id="confirm-topic">—</div>
      </div>
    </div>

    <div class="confirm-actions">
      <button class="btn-primary" onclick="goHome()">继 续 新 选 题</button>
      <button class="btn-secondary" onclick="goResults()">← 返回查看其他方向</button>
    </div>
  </div>
</div>

<!-- ═══ SCREEN 5: ERROR ═══ -->
<div class="screen" id="screen-error">
  <div class="error-body">
    <div class="error-icon">⚠️</div>
    <div class="error-title">服务暂时繁忙</div>
    <div class="error-msg" id="error-msg">网络连接超时，请检查网络后重试。</div>
    <button class="btn-retry" onclick="goHome()">重新尝试</button>
  </div>
</div>

<script>
// ─── STATE ───
let currentTopic = '';
let resultData = null;
let selectedChoice = null;

// ─── NAVIGATION ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goHome() { showScreen('screen-home'); selectedChoice = null; document.querySelectorAll('.select-btn').forEach(b => b.classList.remove('chosen')); }
function goResults() { showScreen('screen-results'); selectedChoice = null; document.querySelectorAll('.select-btn').forEach(b => b.classList.remove('chosen')); updateConfirmBtn(); }

// ─── HOME ───
const textarea = document.getElementById('research-input');
const charCount = document.getElementById('char-count');
textarea.addEventListener('input', () => {
  charCount.textContent = `${textarea.value.length} / 300`;
});

function fillExample(el) {
  textarea.value = el.textContent.trim();
  charCount.textContent = `${textarea.value.length} / 300`;
  textarea.focus();
}

// ─── LOADING ANIMATION ───
function animateLoading() {
  const steps = ['step1', 'step2', 'step3', 'step4'];
  let i = 0;
  steps.forEach(id => {
    const el = document.getElementById(id);
    el.className = 'loading-step';
  });

  const interval = setInterval(() => {
    if (i > 0) document.getElementById(steps[i - 1]).className = 'loading-step done';
    if (i < steps.length) {
      document.getElementById(steps[i]).className = 'loading-step active';
      i++;
    } else {
      clearInterval(interval);
    }
  }, 1200);
}

// ─── START ANALYZE ───
async function startAnalyze() {
  const input = textarea.value.trim();
  if (!input) {
    textarea.style.borderColor = '#c0392b';
    setTimeout(() => textarea.style.borderColor = '', 1500);
    return;
  }
  currentTopic = input;
  document.getElementById('loading-topic-text').textContent = input.length > 30 ? input.slice(0, 30) + '…' : input;

  showScreen('screen-loading');
  animateLoading();

  try {
    const data = await callClaude(input);
    resultData = data;
    renderResults(data);
    showScreen('screen-results');
  } catch (e) {
    document.getElementById('error-msg').textContent = e.message || '网络连接超时，请检查网络后重试。';
    showScreen('screen-error');
  }
}

// ─── CALL CLAUDE API ───
async function callClaude(topic) {
  const systemPrompt = `你是"文献助教"，帮助高校老师为研究主题找到跨学科的创新视角和参考文献。

用户会输入一个研究想法，你需要：
1. 提取核心关键词（2-4个）
2. 生成3个来自不同学科领域的创新视角（A/B/C）
3. 每个视角配4篇参考文献（2篇本领域+2篇跨领域借鉴）

严格返回如下JSON格式，不要有任何其他文字：
{
  "topic_summary": "研究主题的简洁概括（20字内）",
  "keywords": ["关键词1", "关键词2", "关键词3"],
  "perspectives": [
    {
      "letter": "A",
      "domain": "领域名称（4-8字）",
      "entry_point": "具体的研究切入点和研究问题描述（30-60字）",
      "papers": [
        {"title": "论文标题", "source": "来源", "year": "年份", "type": "本领域"},
        {"title": "论文标题", "source": "来源", "year": "年份", "type": "本领域"},
        {"title": "论文标题", "source": "来源", "year": "年份", "type": "跨领域借鉴"},
        {"title": "论文标题", "source": "来源", "year": "年份", "type": "跨领域借鉴"}
      ]
    },
    {
      "letter": "B",
      "domain": "领域名称",
      "entry_point": "研究切入点",
      "papers": [...]
    },
    {
      "letter": "C",
      "domain": "领域名称",
      "entry_point": "研究切入点",
      "papers": [...]
    }
  ]
}

要求：
- 视角必须来自不同学科（如认知心理、健康心理、教育经济、组织行为、传播学等）
- 切入点要具体可操作，有明确的研究问题
- 参考文献需真实合理，包含实际存在的文献
- 完全使用中文`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: `我的研究想法：${topic}` }]
    })
  });

  if (!response.ok) throw new Error('服务繁忙，请稍后再试');

  const json = await response.json();
  const text = json.content?.[0]?.text || '';
  const cleaned = text.replace(/```json|```/g, '').trim();

  try {
    return JSON.parse(cleaned);
  } catch {
    // Fallback: try to extract JSON
    const match = cleaned.match(/\{[\s\S]*\}/);
    if (match) return JSON.parse(match[0]);
    throw new Error('AI返回格式异常，请重试');
  }
}

// ─── RENDER RESULTS ───
function renderResults(data) {
  const body = document.getElementById('results-body');
  const keywords = (data.keywords || []).map(k => `<span class="keyword-tag">${k}</span>`).join('');

  let html = `
    <div class="result-meta">
      <div class="result-meta-label">研究主题</div>
      <div class="result-topic">${escHtml(data.topic_summary || currentTopic)}</div>
      <div class="result-keywords">${keywords}</div>
    </div>
    <div class="perspective-cards">
  `;

  (data.perspectives || []).forEach(p => {
    const papersHtml = (p.papers || []).map(paper => `
      <div class="paper-item ${paper.type === '跨领域借鉴' ? 'cross' : ''}">
        <div class="paper-title">${escHtml(paper.title)}</div>
        <div class="paper-meta">
          <span>${escHtml(paper.source)}</span>
          ${paper.year ? `<span>·</span><span>${escHtml(paper.year)}</span>` : ''}
          <span class="paper-tag">${paper.type === '跨领域借鉴' ? '跨领域' : '本领域'}</span>
        </div>
      </div>
    `).join('');

    html += `
      <div class="card" id="card-${p.letter}">
        <div class="card-label-bar">
          <div class="card-letter">${escHtml(p.letter)}</div>
          <div class="card-domain">${escHtml(p.domain)}</div>
        </div>
        <div class="card-body">
          <div class="card-entry">${escHtml(p.entry_point)}</div>
          <div class="papers-toggle" onclick="togglePapers(this)">
            <span class="papers-toggle-label">📖 参考文献（4篇）</span>
            <span class="papers-toggle-icon">▼</span>
          </div>
          <div class="papers-list">
            ${papersHtml}
          </div>
        </div>
      </div>
    `;
  });

  html += `</div>
    <div class="select-section">
      <div class="select-label">你想选择哪个方向？</div>
      <div class="select-btns">
        <button class="select-btn" onclick="chooseDirection('A')">A</button>
        <button class="select-btn" onclick="chooseDirection('B')">B</button>
        <button class="select-btn" onclick="chooseDirection('C')">C</button>
      </div>
      <button class="select-btn-confirm" id="confirm-btn" onclick="confirmChoice()">确 认 选 题 →</button>
    </div>
  `;

  body.innerHTML = html;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function togglePapers(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

// ─── DIRECTION CHOICE ───
function chooseDirection(letter) {
  selectedChoice = letter;
  document.querySelectorAll('.select-btn').forEach((btn, i) => {
    btn.classList.toggle('chosen', ['A','B','C'][i] === letter);
  });
  document.querySelectorAll('.card').forEach(card => {
    card.classList.toggle('selected', card.id === `card-${letter}`);
  });
  updateConfirmBtn();

  // Scroll to card
  const card = document.getElementById(`card-${letter}`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateConfirmBtn() {
  const btn = document.getElementById('confirm-btn');
  if (!btn) return;
  btn.classList.toggle('visible', !!selectedChoice);
}

function confirmChoice() {
  if (!selectedChoice || !resultData) return;
  const p = (resultData.perspectives || []).find(x => x.letter === selectedChoice);
  if (!p) return;

  document.getElementById('confirm-letter').textContent = selectedChoice;
  document.getElementById('confirm-domain').textContent = p.domain;
  document.getElementById('confirm-entry').textContent = p.entry_point;
  document.getElementById('confirm-topic').textContent = resultData.topic_summary || currentTopic;

  showScreen('screen-confirm');
}
</script>
</body>
</html>
